<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background, split diagonally: top-left white, bottom-right green -->
  <rect width="32" height="32" rx="7" fill="#00C853"/>

  <!-- White triangle top-left region (diagonal split) -->
  <clipPath id="roundClip">
    <rect width="32" height="32" rx="7"/>
  </clipPath>
  <polygon points="0,0 32,0 0,32" fill="white" clip-path="url(#roundClip)"/>

  <!-- Q circular cutout in the green area — the "tail" of Q -->
  <!-- A circle knocked out from the green zone (bottom-right) -->
  <!-- White filled circle with green center to simulate Q hole -->
  <circle cx="21" cy="21" r="5.5" fill="white" clip-path="url(#roundClip)"/>
  <circle cx="21" cy="21" r="3.2" fill="#00C853" clip-path="url(#roundClip)"/>

  <!-- Q tail slash line -->
  <line x1="23.5" y1="23.5" x2="26.5" y2="26.5" stroke="white" stroke-width="2.2" stroke-linecap="round" clip-path="url(#roundClip)"/>
</svg>

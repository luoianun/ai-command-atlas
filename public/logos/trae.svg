<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <!-- Green outer rectangle (no rounded corners), offset left-heavy -->
  <rect x="3" y="9" width="24" height="15" fill="#2EE65A"/>
  <!-- Black inner rectangle, shifts right leaving thick green left border -->
  <rect x="8" y="11" width="18" height="11" fill="#0a0a0a"/>
  <!-- Left diamond -->
  <rect x="11.5" y="14" width="4" height="4" fill="#2EE65A" transform="rotate(45 13.5 16)"/>
  <!-- Right diamond -->
  <rect x="18.5" y="14" width="4" height="4" fill="#2EE65A" transform="rotate(45 20.5 16)"/>
</svg>

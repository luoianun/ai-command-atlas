<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Green outer rounded-rect frame (offset: thicker on left+bottom) -->
  <rect x="2" y="8" width="25" height="16" rx="2.5" fill="#2EE65A"/>

  <!-- Black inner rect (offset upper-right, leaving more green on left+bottom) -->
  <rect x="7" y="10" width="18" height="12" rx="1.5" fill="#0a0a0a"/>

  <!-- Left diamond (green, rotated 45°) -->
  <rect x="10" y="14" width="4.5" height="4.5" fill="#2EE65A" transform="rotate(45 12.25 16.25)"/>

  <!-- Right diamond (green, rotated 45°) -->
  <rect x="17.5" y="14" width="4.5" height="4.5" fill="#2EE65A" transform="rotate(45 19.75 16.25)"/>
</svg>
